name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -c "from app.engine import DeepBrief; print('imports ok')"
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t deepbrief:test .
      - run: docker run -d --name db-test -p 8000:8000 deepbrief:test
      - run: sleep 5 && curl -f http://localhost:8000/health
