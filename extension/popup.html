<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #13161c;
      --border: #232838;
      --text: #e1e5ee;
      --muted: #8b92a8;
      --accent: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .header {
      display: flex; align-items: center; gap: .5rem;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .header svg { width: 20px; height: 20px; }
    .header h1 { font-size: 1rem; font-weight: 600; }
    .content { padding: 1rem; }
    .url { font-size: .75rem; color: var(--muted); margin-bottom: .75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .actions { display: flex; gap: .5rem; margin-bottom: .75rem; }
    .btn {
      flex: 1; padding: .5rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: .85rem; font-weight: 500;
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.primary:hover { opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .status { font-size: .8rem; color: var(--muted); margin-bottom: .5rem; }
    .result {
      max-height: 320px; overflow-y: auto;
      padding: .75rem; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: .85rem; line-height: 1.6;
    }
    .result h3 { font-size: .9rem; margin: .5rem 0 .25rem; }
    .result p { margin: .25rem 0; }
    .result ul { margin-left: 1rem; }
    .result li { margin: .15rem 0; }
    .result a { color: var(--accent); }
    .settings { padding: 1rem; border-top: 1px solid var(--border); }
    .settings label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: .25rem; }
    .settings input {
      width: 100%; padding: .4rem .6rem; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: .8rem;
    }
    .hidden { display: none; }
    .spinner {
      width: 14px; height: 14px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite; display: inline-block; vertical-align: middle; margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <h1>DeepBrief</h1>
  </div>

  <div class="content">
    <div class="url" id="pageUrl">Loading...</div>
    <div class="actions">
      <button class="btn primary" id="briefBtn" onclick="briefPage()">DeepBrief This Page</button>
      <button class="btn" id="settingsBtn" onclick="toggleSettings()">⚙️</button>
    </div>
    <div class="status" id="status"></div>
    <div class="result hidden" id="result"></div>
  </div>

  <div class="settings hidden" id="settingsPanel">
    <label>API URL</label>
    <input type="text" id="apiUrl" value="http://localhost:8090" onchange="saveSettings()">
    <label style="margin-top:.5rem">Custom Question (optional)</label>
    <input type="text" id="customQuestion" placeholder="Summarize this page" onchange="saveSettings()">
  </div>

  <script src="popup.js"></script>
</body>
</html>
