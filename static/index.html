<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepBrief — Research Intelligence</title>
    <style>
        :root {
            --bg: #0c0e12;
            --surface: #13161c;
            --surface-hover: #1a1f28;
            --border: #232838;
            --text: #e1e5ee;
            --muted: #8b92a8;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 840px; margin: 0 auto; padding: 3rem 1.5rem; }
        header { text-align: center; margin-bottom: 3rem; }
        .logo { display: inline-flex; align-items: center; gap: .6rem; font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 18px; height: 18px; }
        .tagline { color: var(--muted); font-size: 1.1rem; }

        /* Search */
        .search-box { position: relative; margin-bottom: .75rem; }
        .search-box input {
            width: 100%; padding: 1rem 3.5rem 1rem 1.25rem;
            background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
            color: var(--text); font-size: 1.05rem; outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .search-box input::placeholder { color: var(--muted); }
        .search-box button {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            padding: .6rem 1.2rem; border-radius: 10px; border: none;
            background: var(--accent); color: white; font-weight: 600; cursor: pointer;
            transition: background .2s;
        }
        .search-box button:hover { background: var(--accent-light); }
        .search-box button:disabled { opacity: .5; cursor: not-allowed; }

        /* PDF Upload */
        .pdf-bar { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .pdf-upload-btn {
            display: inline-flex; align-items: center; gap: .4rem;
            padding: .45rem .9rem; border-radius: 8px; border: 1px dashed var(--border);
            background: var(--surface); color: var(--muted); font-size: .85rem; cursor: pointer;
            transition: all .2s;
        }
        .pdf-upload-btn:hover { border-color: var(--accent); color: var(--accent); }
        .pdf-chip {
            display: inline-flex; align-items: center; gap: .4rem;
            padding: .35rem .7rem; border-radius: 8px;
            background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
            font-size: .8rem; color: var(--accent-light);
        }
        .pdf-chip .remove { cursor: pointer; opacity: .7; }
        .pdf-chip .remove:hover { opacity: 1; color: var(--red); }
        input[type="file"] { display: none; }

        /* Status pills */
        .status-bar { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem; min-height: 32px; }
        .pill {
            display: inline-flex; align-items: center; gap: .4rem;
            padding: .35rem .75rem; border-radius: 20px; font-size: .8rem;
            background: var(--surface); border: 1px solid var(--border);
            animation: fadeIn .3s ease;
        }
        .pill.active { border-color: var(--accent); background: rgba(99,102,241,0.08); }
        .pill.done { border-color: var(--green); background: rgba(34,197,94,0.08); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Sources strip */
        .sources-strip { display: flex; gap: .5rem; overflow-x: auto; padding: .5rem 0; margin-bottom: 1rem; }
        .source-chip {
            flex-shrink: 0; padding: .4rem .7rem; border-radius: 8px;
            background: var(--surface); border: 1px solid var(--border);
            font-size: .78rem; color: var(--muted); cursor: pointer;
            transition: border-color .2s, color .2s;
            max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .source-chip:hover { border-color: var(--accent); color: var(--text); }
        .source-chip .domain { color: var(--accent); font-weight: 500; }

        /* Answer */
        .answer-box {
            background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
            padding: 1.5rem; line-height: 1.75; font-size: .98rem;
            opacity: 0; animation: fadeIn .5s ease forwards;
        }
        .answer-box h2 { font-size: 1.2rem; margin: 1.5rem 0 .5rem; color: var(--text); }
        .answer-box h2:first-child { margin-top: 0; }
        .answer-box h3 { font-size: 1.05rem; margin: 1.2rem 0 .4rem; color: var(--text); }
        .answer-box p { margin: .6rem 0; }
        .answer-box ul, .answer-box ol { margin: .6rem 0 .6rem 1.5rem; }
        .answer-box li { margin: .3rem 0; }
        .answer-box a { color: var(--accent); }
        .answer-box blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin: 1rem 0; color: var(--muted); }
        .answer-box code { background: rgba(99,102,241,0.1); padding: .1rem .3rem; border-radius: 4px; font-size: .9em; }
        .answer-box pre { background: var(--bg); padding: 1rem; border-radius: 8px; overflow-x: auto; }
        .answer-box sup { color: var(--accent); font-weight: 600; cursor: help; }
        .answer-box sup:hover { text-decoration: underline; }

        .sources-list { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        .sources-list h3 { font-size: .9rem; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: .75rem; }
        .source-item { display: flex; gap: .7rem; align-items: start; padding: .6rem 0; }
        .source-num { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: white; font-size: .75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .source-info { min-width: 0; }
        .source-title { font-size: .9rem; font-weight: 500; color: var(--text); }
        .source-domain { font-size: .78rem; color: var(--muted); }

        .history-section { margin-top: 3rem; }
        .history-section h3 { font-size: .9rem; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: .75rem; }
        .history-item { padding: .8rem 1rem; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); margin-bottom: .5rem; cursor: pointer; transition: border-color .2s; }
        .history-item:hover { border-color: var(--accent); }
        .history-q { font-size: .9rem; font-weight: 500; }
        .history-meta { font-size: .75rem; color: var(--muted); margin-top: .2rem; }

        .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }
        .stats { display: flex; gap: 1.5rem; font-size: .8rem; color: var(--muted); margin-top: 1rem; }

        @media (max-width: 640px) {
            .container { padding: 1.5rem 1rem; }
            .logo { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                </div>
                DeepBrief
            </div>
            <p class="tagline">Ask anything. Get a cited research brief in seconds.</p>
        </header>

        <div class="search-box">
            <input type="text" id="query" placeholder="What are the latest developments in AI regulation?"
                onkeydown="if(event.key==='Enter') startResearch()" autocomplete="off">
            <button id="searchBtn" onclick="startResearch()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
            </button>
        </div>

        <div class="pdf-bar" id="pdfBar">
            <label class="pdf-upload-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Add PDF
                <input type="file" id="pdfInput" accept=".pdf" multiple onchange="handlePdfSelect(event)">
            </label>
        </div>

        <div class="status-bar" id="statusBar"></div>
        <div class="sources-strip" id="sourcesStrip"></div>
        <div id="result"></div>

        <div class="history-section" id="historySection" style="display:none">
            <h3>Recent Research</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let currentEventSource = null;
        let uploadedPdfs = [];
        let history = JSON.parse(localStorage.getItem('deepbrief_history') || '[]');

        function renderHistory() {
            const list = document.getElementById('historyList');
            const section = document.getElementById('historySection');
            if (history.length === 0) { section.style.display = 'none'; return; }
            section.style.display = 'block';
            list.innerHTML = history.slice(0, 10).map((h, i) => `
                <div class="history-item" onclick="loadHistory(${i})">
                    <div class="history-q">${escapeHtml(h.query)}</div>
                    <div class="history-meta">${h.sources} sources · ${h.time}s · ${new Date(h.date).toLocaleDateString()}</div>
                </div>
            `).join('');
        }

        function loadHistory(idx) {
            document.getElementById('query').value = history[idx].query;
            startResearch();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handlePdfSelect(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (!file.name.endsWith('.pdf')) return;
                uploadedPdfs.push(file);
            });
            renderPdfChips();
        }

        function renderPdfChips() {
            const bar = document.getElementById('pdfBar');
            // Keep the upload button, remove old chips
            const btn = bar.querySelector('.pdf-upload-btn');
            bar.innerHTML = '';
            bar.appendChild(btn);
            uploadedPdfs.forEach((file, i) => {
                const chip = document.createElement('div');
                chip.className = 'pdf-chip';
                chip.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ${escapeHtml(file.name)} <span class="remove" onclick="removePdf(${i})">&times;</span>`;
                bar.appendChild(chip);
            });
        }

        function removePdf(idx) {
            uploadedPdfs.splice(idx, 1);
            renderPdfChips();
        }

        function addStatus(text, state) {
            const bar = document.getElementById('statusBar');
            const pill = document.createElement('div');
            pill.className = `pill ${state || ''}`;
            if (state === 'active') {
                pill.innerHTML = `<svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> ${text}`;
            } else if (state === 'done') {
                pill.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> ${text}`;
            } else {
                pill.textContent = text;
            }
            bar.appendChild(pill);
            Array.from(bar.children).forEach((p, i) => {
                if (i < bar.children.length - 1 && p.classList.contains('active')) {
                    p.classList.remove('active');
                    p.classList.add('done');
                    p.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> ${p.textContent.replace('✓','').trim()}`;
                }
            });
        }

        function addSourceChip(title, domain, url) {
            const strip = document.getElementById('sourcesStrip');
            const chip = document.createElement('a');
            chip.className = 'source-chip';
            chip.href = url;
            chip.target = '_blank';
            chip.rel = 'noopener';
            chip.innerHTML = `<span class="domain">${escapeHtml(domain)}</span> · ${escapeHtml(title.substring(0,40))}`;
            strip.appendChild(chip);
        }

        function addSourcesList(sources, pdfSources) {
            const result = document.getElementById('result');
            const div = document.createElement('div');
            div.className = 'sources-list';
            let html = '<h3>Sources</h3>';
            sources.forEach((s, i) => {
                html += `
                <div class="source-item">
                    <div class="source-num">${i+1}</div>
                    <div class="source-info">
                        <a href="${s.url}" target="_blank" rel="noopener" class="source-title">${escapeHtml(s.title)}</a>
                        <div class="source-domain">${escapeHtml(s.domain)}</div>
                    </div>
                </div>`;
            });
            if (pdfSources && pdfSources.length) {
                pdfSources.forEach((p, i) => {
                    html += `
                    <div class="source-item">
                        <div class="source-num" style="background:var(--yellow)">P${i+1}</div>
                        <div class="source-info">
                            <span class="source-title">${escapeHtml(p.filename)}</span>
                            <div class="source-domain">PDF Document</div>
                        </div>
                    </div>`;
                });
            }
            div.innerHTML = html;
            result.appendChild(div);
        }

        function formatAnswer(text) {
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            text = text.replace(/\[(\w?)\d+\]/g, '<sup>$&</sup>');
            text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            text = text.replace(/^# (.+)$/gm, '<h2>$1</h2>');
            text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
            text = text.replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>');
            text = text.replace(/<\/ul>\s*<ul>/g, '');
            text = text.split('\n\n').map(p => {
                if (p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<li')) return p;
                return `<p>${p}</p>`;
            }).join('\n');
            return text;
        }

        async function startResearch() {
            const query = document.getElementById('query').value.trim();
            if (!query) return;

            if (currentEventSource) currentEventSource.close();
            document.getElementById('statusBar').innerHTML = '';
            document.getElementById('sourcesStrip').innerHTML = '';
            document.getElementById('result').innerHTML = '';
            document.getElementById('searchBtn').disabled = true;
            addStatus('Searching web...', 'active');

            const startTime = Date.now();

            try {
                if (uploadedPdfs.length > 0) {
                    // Use multipart upload endpoint
                    const formData = new FormData();
                    formData.append('q', query);
                    uploadedPdfs.forEach(file => formData.append('files', file));

                    const resp = await fetch('/brief-with-pdfs', {
                        method: 'POST',
                        body: formData
                    });
                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n\n');
                        buffer = lines.pop() || '';
                        for (const chunk of lines) {
                            processEvent(chunk);
                        }
                    }
                    if (buffer.trim()) processEvent(buffer.trim());
                } else {
                    // Use SSE endpoint
                    currentEventSource = new EventSource(`/brief?q=${encodeURIComponent(query)}`);
                    currentEventSource.addEventListener('status', e => {
                        const d = JSON.parse(e.data);
                        addStatus(d.message, 'active');
                    });
                    currentEventSource.addEventListener('sources', e => {
                        const d = JSON.parse(e.data);
                        addStatus(`${d.count} sources found`, 'done');
                    });
                    currentEventSource.addEventListener('done', e => {
                        const d = JSON.parse(e.data);
                        currentEventSource.close();
                        renderResult(d, startTime);
                    });
                    currentEventSource.addEventListener('error', e => {
                        currentEventSource.close();
                        document.getElementById('searchBtn').disabled = false;
                        const d = JSON.parse(e.data || '{"message":"Error"}');
                        addStatus(d.message || 'Error', '');
                    });
                }
            } catch (err) {
                document.getElementById('searchBtn').disabled = false;
                addStatus('Error: ' + err.message, '');
            }
        }

        function processEvent(chunk) {
            if (!chunk.includes('event:')) return;
            const lines = chunk.split('\n');
            let evt = '', data = '';
            for (const line of lines) {
                if (line.startsWith('event:')) evt = line.replace('event:', '').trim();
                if (line.startsWith('data:')) data = line.replace('data:', '').trim();
            }
            if (evt === 'status') {
                const d = JSON.parse(data);
                addStatus(d.message, 'active');
            } else if (evt === 'sources') {
                const d = JSON.parse(data);
                addStatus(`${d.count} sources found`, 'done');
            } else if (evt === 'done') {
                const d = JSON.parse(data);
                renderResult(d, Date.now() - 5000); // approximate
            } else if (evt === 'error') {
                document.getElementById('searchBtn').disabled = false;
                const d = JSON.parse(data);
                addStatus(d.message || 'Error', '');
            }
        }

        function renderResult(d, startTime) {
            document.getElementById('searchBtn').disabled = false;
            const result = document.getElementById('result');
            const box = document.createElement('div');
            box.className = 'answer-box';
            box.innerHTML = formatAnswer(d.answer);
            result.appendChild(box);
            addSourcesList(d.sources || [], d.pdf_sources || []);
            const stats = document.createElement('div');
            stats.className = 'stats';
            const totalSources = (d.sources?.length || 0) + (d.pdf_sources?.length || 0);
            stats.innerHTML = `${totalSources} sources · ${d.search_time}s search · ${d.read_time}s read`;
            result.appendChild(stats);

            history.unshift({
                query: d.query,
                sources: totalSources,
                time: Math.round((Date.now() - startTime) / 1000),
                date: new Date().toISOString()
            });
            localStorage.setItem('deepbrief_history', JSON.stringify(history.slice(0, 20)));
            renderHistory();
        }

        renderHistory();
    </script>
</body>
</html>
